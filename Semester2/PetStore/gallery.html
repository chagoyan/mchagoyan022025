<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Image Gallery</title>
    <style>
        body {
            background-color: #425E05;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif
        }

        h1 {
            text-align: center;
            color: #4E3717;
        }

        main {
            border: 5px solid burlywood;
            width: 80%;
            max-width: 1280px;
            margin: auto;
            padding: 1rem;
            background-color: olive;
            border-radius: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
        }

        main img {
            width: 100%;
            max-width: 250px;
            aspect-ratio: 1 / 1;
            border-radius: 15px;
            border: 4px solid #4E3717;
        }
    </style>
</head>

<body>
    <h1>Flexbox Image Gallery</h1>

    <main>
        <img src="Images/pet001.png" alt="Puppy on a grass field">
        <img src="Images/pet002.png" alt="Iguana on a tree branch">
        <img src="Images/pet002.png" alt="Iguana on a tree branch">
        <img src="Images/pet002.png" alt="Iguana on a tree branch">
        <img src="Images/pet002.png" alt="Iguana on a tree branch">
        <img src="Images/pet002.png" alt="Iguana on a tree branch">
        <img src="Images/pet002.png" alt="Iguana on a tree branch">
        <img src="Images/pet002.png" alt="Iguana on a tree branch">
        <img src="Images/pet002.png" alt="Iguana on a tree branch">
        <img src="Images/pet002.png" alt="Iguana on a tree branch">
    </main>

</body>

</html>
