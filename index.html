<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel Chagoyan - Portfolio</title>

    <style>
        /* CSS Section */
        body {
            background-color: crimson;
            background-image: url(https://wallpapers.com/images/featured/dragon-ball-appsmsvihvalq341.jpg);
            background-size: cover;
        }

        #container {
            background-color: rgba(255, 120, 71, 0.499);
            border-radius: 35px;
            padding: 16px;
            width: 80%;
            max-width: 1200px;
            margin: auto;
            margin-top: 150px;
        }

        #wrapper {
            border: 5px solid black;
            width: 80%;
            margin: auto;

        }

        #pageheader {
            min-height: 200px;
            background-color: lightgreen;
            padding: 16px;
            background-image: url(https://wallpapers.com/images/featured/dragon-ball-appsmsvihvalq341.jpg);
            background-size: cover;
            transition: all 2s;
        }

        nav {
            min-height: 50px;
            background-color: cadetblue;
            padding: 16px;
        }

        #media {
            min-height: 50px;
            background-color: seagreen;
            padding: 16px;
        }

        main {
            min-height: 50px;
            background-color: white;
            padding: 16px;
        }

        #semester1 {
            min-height: 50px;
            background-color: aquamarine;
            padding: 16px;
        }

        #semester2 {
            min-height: 50px;
            background-color: teal;
            padding: 16px;
        }

        #pagefooter {
            min-height: 50px;
            background-color: lightseagreen;
            padding: 16px;
        }

        #subfooter {
            min-height: 50px;
            background-color: darkslategrey;
            padding: 16px;
        }

        @media screen and (min-width:1100px) {
            #media {
                background-color: red;
            }

            main {
                background-color: blue;
            }

            #pageheader {
                min-height: 500px;
            }

        }
    </style>
</head>

<body>
    <div id="container">
        <div id="wrapper">
            <header id="pageheader"> Header </header>
            <nav id="pagenav"> Nav </nav>
            <div id="media"> Media </div>
            <main> Main </main>
            <section id="semester1"> Semester 1</section>
            <section id="semester2"> Semester 2</section>
            <footer id="pagefooter"> Footer</footer>
            <footer id="subfooter"> Subfooter </footer>
        </div>
        <!-- End the wrapper -->
    </div>
    <!-- End the container -->
</body>

</html>
