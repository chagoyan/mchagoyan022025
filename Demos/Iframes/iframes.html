<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframes</title>
    <style>
        iframe {
            display: block;
            margin: auto;
            width: 80%;
            width: 352px;
            height: 352px;
        }

        iframe#slide {

            aspect-ratio: 960 / 569;
        }
    </style>

<body>
    <h1>Iframes</h1>

    <h2>Spotify</h2>

    <iframe data-testid="embed-iframe" style="border-radius:12px"
        src="https://open.spotify.com/embed/playlist/38MX90PjGdbVtJPdIASQst?utm_source=generator&theme=0" width="100%"
        height="352" frameBorder="0" allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

    <h2>Google Slides</h2>

    <iframe id="slide"
        src="https://docs.google.com/presentation/d/e/2PACX-1vTYmZJxmE9s_AmJzugqRK8IqEqCTJ5iq_FNMD4Ll_iv87HMmSFhH9SxUjBFykiElWK384nxLsqZx2Si/pubembed?start=true&loop=true&delayms=3000"
        frameborder="0" width="960" height="569" allowfullscreen="true" mozallowfullscreen="true"
        webkitallowfullscreen="true"></iframe>

    <h2>Google Maps</h2>
    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3322.599948024788!2d-120.36529528851808!3d36.14428037232661!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8093433f7cf9235b%3A0xd672886e6fbf3f9c!2sCoalinga%20High%20School!5e1!3m2!1sen!2sus!4v1773249919710!5m2!1sen!2sus"
        width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>



</body>

</html>
