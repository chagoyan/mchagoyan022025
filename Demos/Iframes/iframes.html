<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframes</title>

    <style>
        body {
            background-color: teal;
        }

        h1 {
            color: white;
            text-align: center;
            ;
        }

        .card {
            padding: 1rem;
            background-color: white;
            border-radius: 1rem;
            width: 80%;
            margin: auto;
            margin-bottom: 2rem;
        }

        h2 {
            color: teal;
            margin: 0;
            padding: 1rem;
        }

        #spotify {
            height: 352px;
            width: 80%;
            max-width: 600px;
            margin: auto;
            display: block;
        }

        #slide {
            width: 80%;
            margin: auto;
            display: block;
            min-height: 352px;
            aspect-ratio: 16 / 9;
            max-width: 960px;
        }

        .pdf {
            width: 80%;
            display: block;
            margin: auto;
            min-height: 352px;
            aspect-ratio: 4 / 3;
            max-width: 960px;
        }

        @media screen and (min-width:1200px) {
            body {
                background-color: yellow;
            }

            .cards {
                padding: 1rem;
                background-color: orange;
                display: flex;
                gap: 1rem;
            }
        }
    </style>


<body>
    <h1>Iframes</h1>



    <section class="card">

        <h2>Spotify</h2>

        <iframe id="spotify" data-testid="embed-iframe" style="border-radius:12px"
            src="https://open.spotify.com/embed/playlist/38MX90PjGdbVtJPdIASQst?utm_source=generator&theme=0"
            frameBorder="0" allowfullscreen=""
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
        </iframe>

    </section>


    <section class="card">

        <h2>Google Slides</h2>

        <iframe id="slide"
            src="https://docs.google.com/presentation/d/e/2PACX-1vTYmZJxmE9s_AmJzugqRK8IqEqCTJ5iq_FNMD4Ll_iv87HMmSFhH9SxUjBFykiElWK384nxLsqZx2Si/pubembed?start=true&loop=true&delayms=3000"
            frameborder="0" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true">
        </iframe>

    </section>





    <div class="cards">
        <section class="card">
            <iframe class="pdf" src="../../Certificates/demo_certificate.pdf" frameborder="0">
            </iframe>
        </section>


        <section class="card">
            <iframe class="pdf" src="../../Certificates/demo_certificate.pdf" frameborder="0">
            </iframe>
        </section>

        <section class="card">
            <iframe class="pdf" src="../../Certificates/demo_certificate.pdf" frameborder="0">
            </iframe>
        </section>
    </div>





</body>

</html>
