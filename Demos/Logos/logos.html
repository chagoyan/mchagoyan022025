<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logos</title>

    <style>
        body {
            background-color: red;
        }

        h1 {
            color: white;
        }

        header {
            min-height: 200px;
            background-color: yellow;
        }

        #logo {
            height: 100px;
            width: 100px;
            background-color: blue;
            background-image: url(Images/lego_logo.svg);
            background-size: cover;
            border-radius: 50%;
            border: 6px solid black;
        }
    </style>


</head>

<body>
    <h1>Logos</h1>
    <header>
        <div id="logo"></div>
    </header>
</body>

</html>
