<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Classes</title>

    <style>
        h3.c1 {
            color: red;
            background-color: pink;
            padding: 1rem;
            border: 2px solid black;
        }

        h3.c2 {
            color: yellow;
            background-color: blue;
            padding: 1rem;
            border: 2px solid red;
        }
    </style>



</head>

<body>
    <h1>CSS Classes</h1>
    <h2>Color Theory</h2>

    <h3 class="c1">Color 1</h3>
    <h3 class="c1">Color 1</h3>
    <h3 class="c1">Color 1</h3>

    <h3 class="c2">Color 2</h3>
    <h3 class="c2">Color 2</h3>
    <h3 class="c2">Color 2</h3>
</body>

</html>
