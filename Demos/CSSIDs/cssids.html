<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>CSS IDs</title>

    <style>
        body {
            background-color: cadetblue;
        }

        h3#c1 {
            background: pink;
        }

        h3#c2 {
            background-color: purple;
        }

        h3#c3 {
            background-color: aqua;
        }
    </style>


</head>

<body>
    <h1>Color Theory</h1>
    <h2>#1 Complementary/Contrast</h2>
    <h3 id="c1">Color 1</h3>
    <h3 id="c2">Color 2</h3>
    <h3 id="c3">Color 3</h3>
    <h3 id="c4">Color 4</h3>
    <h3 id="c5">Color 5</h3>
    <h3 id="c6">Color 6</h3>


</body>

</html>
