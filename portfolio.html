<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel Chagoyan - Portfolio</title>

    <style>
        body {
            background-color: crimson;
        }

        header {
            background-color: rgb(183, 78, 99);
            padding: 1rem;
        }

        nav#pagenav {
            background-color: rgb(237, 120, 144);
            padding: 1rem;
        }

        #hero {
            height: 60vh;
            background-image: url(Images/hero_image.jpg);
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            padding: 20px;
            color: white;
            display: flex;
            text-align: center;
            justify-content: center;
            align-items: center;
        }

        #hero-content h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 2px black;
        }

        #hero-content p {
            color: white;
            font-size: 1.2rem;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 20px;
        }

        #hero-content a {
            color: white;
            background-color: black;
            padding: 12px 24px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            border-radius: 6px;
        }

        section#career {
            background-color: rgb(116, 53, 65);
            padding: 1rem;
        }

        section#semesters {
            background-color: rgb(221, 72, 102);
            padding: 1rem;
        }

        footer#pagefooter {
            background-color: rgb(199, 121, 137);
            padding: 1rem;
        }

        footer#subfooter {
            background-color: rgb(241, 174, 187);
            padding: 1rem;
        }

        div.container {
            padding: 1rem;
            background-color: white;
            min-height: 150px;
            margin: auto;
            max-width: 1200px;
        }
    </style>


</head>

<body>
    <header>
        <div class="container">
            Header
        </div>
    </header>

    <nav id="pagenav">
        <div class="container">
            Pagenav
        </div>
    </nav>

    <section id="hero">
        <div id="hero-content">
            <h1>Welcome to my Portfolio</h1>
            <p>Explore my projects and see what I can create.</p>
            <a href="#">Get Started </a>
        </div>
    </section>

    <section id="career">
        <div class="container">
            Career
            <ul>
                <li>Career Action Plan</li>
                <li>Job Application</li>
                <li>Letter of Introduction</li>
                <li>References</li>
                <li>Resume</li>
                <li>Letter of Recommendation</li>
            </ul>
        </div>
    </section>



    <section id="semesters">
        <div class="container">
            Semesters
        </div>
    </section>

    <footer id="pagefooter">
        <div class="container">
            Pagefooter
        </div>
    </footer>

    <footer id="subfooter">
        <div class="container">
            Subfooter
        </div>
    </footer>

</body>

</html>
